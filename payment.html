<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.payment-box{
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.payment-box img{
    width:250px;
    margin:20px 0;
}

.price{
    font-size:28px;
    font-weight:bold;
    color:#340653;
}
</style>

</head>
<body>

<div class="payment-box">

    <h2 id="title"></h2>

    <div class="price" id="price"></div>

    <!-- Your UPI QR -->
    <img src="img/QR_Code.png" alt="Payment QR">

    <p>Scan QR Code and Complete Payment</p>

</div>

<script>

const painting = JSON.parse(localStorage.getItem("orderPainting"));

document.getElementById("title").innerText = painting.title;
document.getElementById("price").innerText = "₹" + painting.price;

</script>

</body>
</html>
